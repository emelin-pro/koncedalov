<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emelin.Pro · Прогресс по кейсу</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ========== СТИЛИ (полностью идентичны предыдущей версии) ========== */
    :root {
      --primary: #1BA1FA;
      --primary-dark: #0B7FD4;
      --primary-light: #E8F5FE;
      --primary-glow: rgba(27, 161, 250, 0.15);
      --green: #10B981;
      --green-light: #ECFDF5;
      --green-dark: #059669;
      --amber: #F59E0B;
      --surface: #FFFFFF;
      --bg: #F3F6FA;
      --bg-subtle: #EDF1F7;
      --text-primary: #0F1729;
      --text-secondary: #4B5C72;
      --text-muted: #8896A8;
      --border: #E2E8F0;
      --border-light: #F0F4F8;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --radius-xl: 36px;
      --shadow-sm: 0 1px 3px rgba(0,20,50,0.04);
      --shadow-md: 0 8px 24px -8px rgba(0,20,50,0.08);
      --shadow-lg: 0 20px 40px -12px rgba(0,20,50,0.12);
      --shadow-glow: 0 0 0 4px var(--primary-glow);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .brand-bar {
      max-width: 1200px;
      margin: 0 auto 20px;
      padding: 0 4px;
      animation: fadeDown 0.5s ease-out;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-logo img {
      height: 32px;
      width: auto;
      max-width: 200px;
    }

    .brand-logo-text {
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.03em;
      color: var(--primary);
    }

    .brand-logo-text span { color: var(--text-muted); font-weight: 600; }

    .case-card {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      animation: fadeUp 0.6s ease-out;
      position: relative;
    }

    .case-sticky-header {
      padding: 32px 32px 0;
      transition: box-shadow 0.25s, padding 0.25s;
      background: var(--surface);
      z-index: 10;
    }

    .case-sticky-header.is-sticky { position: sticky; top: 0; }
    .case-sticky-header.stuck { padding: 16px 32px; box-shadow: 0 4px 20px -4px rgba(0,20,50,0.1); border-bottom: 1px solid var(--border-light); }

    .client-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary-dark);
      background: var(--primary-light);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }

    .case-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .header-top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .case-title {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.25;
      transition: font-size 0.25s;
    }

    .coordinator-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .coordinator-toggle:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .coordinator-toggle svg { width: 15px; height: 15px; flex-shrink: 0; }
    .coordinator-toggle .chevron { width: 12px; height: 12px; transition: transform 0.25s; margin-left: 2px; }
    .coordinator-toggle.open .chevron { transform: rotate(180deg); }

    .coordinator-dropdown {
      display: none;
      margin-top: 12px;
      padding: 16px 20px;
      background: var(--bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      animation: slideDown 0.25s ease-out;
    }
    .coordinator-dropdown.visible { display: block; }

    .coordinator-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .coordinator-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #50C3FF);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    .coordinator-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .coordinator-info { display: flex; flex-direction: column; }
    .coordinator-name { font-weight: 700; font-size: 0.95rem; color: var(--text-primary); }
    .coordinator-role { font-size: 0.78rem; color: var(--text-muted); }

    .coordinator-contacts { display: flex; gap: 8px; flex-wrap: wrap; }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 100px;

      font-weight: 600;
